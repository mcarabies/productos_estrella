# Generic single-database configuration file for Alembic.
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Async URL — overridden by env.py at runtime
# sqlalchemy.url = postgresql+asyncpg://...

[post_write_hooks]
# Uncomment to auto-format migrations with ruff:
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
