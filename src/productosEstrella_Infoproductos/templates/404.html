<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Página no encontrada | Productos Estrella</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f0524; color: white; }
    .glow { text-shadow: 0 0 60px rgba(168,85,247,.6); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-center px-6">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-700/15 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-purple-500/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10">
    <p class="text-8xl font-black glow text-purple-400 mb-4">404</p>
    <h1 class="text-3xl font-bold mb-3">Página no encontrada</h1>
    <p class="text-white/50 mb-8 max-w-md">
      El ebook que buscas no existe o aún no está disponible. 
      Explora nuestro catálogo completo.
    </p>
    <a href="/"
       class="inline-block px-8 py-3.5 rounded-xl font-bold text-sm"
       style="background: linear-gradient(135deg, #a855f7, #7e22ce);">
      ← Ver todos los Ebooks
    </a>
  </div>
</body>
</html>
